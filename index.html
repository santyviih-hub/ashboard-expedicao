<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel de Expedição</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
    <h1>Painel de Expedição</h1>
</header>

<section class="cards">

    <div class="card"><h3>Total AT's</h3><span id="totalTasks">0</span></div>
    <div class="card green"><h3>Expedidas</h3><span id="expedidas">0</span></div>
    <div class="card yellow"><h3>Em Piso</h3><span id="empiso">0</span></div>
    <div class="card blue"><h3>Cidades</h3><span id="stations">0</span></div>

</section>

<section class="cards">

    <div class="card"><h3>Pedidos</h3><span id="orders">0</span></div>
    <div class="card"><h3>Motoristas</h3><span id="drivers">0</span></div>
    <div class="card"><h3>Agências</h3><span id="vehicles">0</span></div>

</section>

<div class="importador">

    <textarea id="dadosPlanilha" rows="10"
    placeholder="Cole aqui os dados da planilha"></textarea>

    <button onclick="atualizarDashboard()">Atualizar Dashboard</button>

</div>

<div id="filtros" class="filtros"></div>

<div class="dashboard">

    <div class="table-box">
        <table>
            <thead>
                <tr>
                    <th>AT</th>
                    <th>Corredor</th>
                    <th>Cidade</th>
                    <th>Bairros</th>
                    <th>Agência</th>
                    <th>Driver</th>
                    <th>Status</th>
                    <th>Modal</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

</div>

<script src="app.js"></script>

</body>
</html>
